# Microsservico de assinatura PAdES - Cliente
server.port=8092
# Escuta SO em localhost: o servico nunca e exposto externamente.
server.address=127.0.0.1

# Cofre de certificados A1 (.p12/.pfx)
signer.certsDir=/opt/alfresco/certificados

# Uploads de PDF (ajuste se houver documentos grandes)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Log enxuto
logging.level.root=INFO
